# В корне проекта создай файл render.yaml
services:
  - type: web
    name: BitFood
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn mysite.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: db.sqlite3
          property: connectionString

  - type: postgresql
    name: your-db
    ipAllowList: []